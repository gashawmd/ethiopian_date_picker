name: ethiopian_date_picker
description: A customizable Ethiopian (Ge'ez) calendar date picker widget for Flutter.
version: 0.0.1
homepage: https://github.com/gashawmd/ethiopian_date_picker
repository: https://github.com/gashawmd/ethiopian_date_picker
license: MIT

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Task 6.1 — state management smoke tests only. None of these are
  # runtime dependencies of the package itself.
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  # Task 6.2 — golden/screenshot tests.
  golden_toolkit: ^0.15.0

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux: