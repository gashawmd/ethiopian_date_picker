name: Platform Matrix Verification

# Task 6.3 DoD: manual + automated pass on iOS, Android, Web, Windows, macOS, Linux
# This workflow builds the example app (and runs the package's own test suite)
# on every platform, using GitHub-hosted runners so no local hardware is needed
# for macOS/Windows/Android/iOS.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  # --- Package-level checks: analyzer + full test suite (once is enough, ---
  # --- these don't vary by platform, but we run on Linux for speed)      ---
  analyze-and-test:
    name: Analyze & Test (package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage

  # --- Android build (Ubuntu runners come with Android SDK preinstalled) ---
  build-android:
    name: Build — Android
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'
      - run: flutter pub get
        working-directory: example
      - run: flutter build apk --debug
        working-directory: example

  # --- Web build ---
  build-web:
    name: Build — Web
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'
      - run: flutter pub get
        working-directory: example
      - run: flutter build web
        working-directory: example

  # --- Linux desktop build ---
  build-linux:
    name: Build — Linux desktop
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'
      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
        working-directory: example
      - run: flutter build linux
        working-directory: example

  # --- Windows desktop build ---
  build-windows:
    name: Build — Windows desktop
    runs-on: windows-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
        working-directory: example
      - run: flutter build windows
        working-directory: example

  # --- macOS desktop build ---
  build-macos:
    name: Build — macOS desktop
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
        working-directory: example
      - run: flutter build macos
        working-directory: example

  # --- iOS build (simulator target, no code signing needed to verify it builds) ---
  build-ios:
    name: Build — iOS
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'
      - run: flutter pub get
        working-directory: example
      - run: flutter build ios --no-codesign --simulator
        working-directory: example
